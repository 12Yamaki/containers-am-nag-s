<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat Employés</title>
  <style>
    body { font-family: Arial; background: linear-gradient(135deg,#667eea,#764ba2); margin:0; height:100vh; }
    .container { display:flex; justify-content:center; align-items:center; height:100vh; }
    .box { background:white; padding:30px; border-radius:15px; width:320px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
    input, button { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ccc; }
    button { background:#667eea; color:white; cursor:pointer; }
    nav { background:#333; padding:10px; display:flex; justify-content:space-around; }
    nav button { background:none; border:none; color:white; cursor:pointer; }
    .page { display:none; padding:20px; background:white; min-height:calc(100vh - 50px); }
    .active { display:block; }
    #messages { height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-bottom:10px; }
    #msgInput { width:60%; display:inline-block; }
    #imgInput { width:30%; display:inline-block; }
    #chat button { width:100%; margin-top:5px; }
    img.chat-img { max-width:100%; border-radius:8px; margin-top:5px; }
  </style>
</head>
<body>

<!-- CONNEXION -->
<div id="loginPage" class="container">
  <div class="box">
    <h2>Connexion</h2>
    <input type="text" id="loginUser" placeholder="Nom d'utilisateur">
    <input type="password" id="loginPass" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <span class="link" onclick="showRegister()">Créer un compte</span>
  </div>
</div>

<!-- INSCRIPTION -->
<div id="registerPage" class="container" style="display:none;">
  <div class="box">
    <h2>Inscription</h2>
    <input type="text" id="registerUser" placeholder="Nom d'utilisateur">
    <input type="password" id="registerPass" placeholder="Mot de passe">
    <button onclick="register()">S'inscrire</button>
    <span class="link" onclick="showLogin()">Déjà un compte ?</span>
  </div>
</div>

<!-- SITE -->
<div id="mainSite" style="display:none;">
  <nav>
    <button onclick="showPage('home')">Accueil</button>
    <button onclick="showPage('profile')">Profil</button>
    <button onclick="showPage('chat')">Chat</button>
    <button onclick="logout()">Déconnexion</button>
  </nav>

  <div id="home" class="page active">
    <h2>Accueil</h2>
    <p>Bienvenue sur le chat interne !</p>
  </div>

  <div id="profile" class="page">
    <h2>Profil</h2>
    <p id="userDisplay"></p>
  </div>

  <div id="chat" class="page">
    <h2>Communication</h2>
    <div id="messages"></div>
    <input id="msgInput" placeholder="Écris un message">
    <input type="file" id="imgInput" accept="image/*">
    <button id="sendBtn">Envoyer</button>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script>
  // Configuration Firebase
  const firebaseConfig = {
    apiKey:"AIzaSyBlQw4vMAqGU4Ii8ShHptQOqMvfnoXqBdA",
    authDomain:"contenaires-it.firebaseapp.com",
    databaseURL:"https://contenaires-it-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:"contenaires-it",
    storageBucket:"contenaires-it.appspot.com",
    messagingSenderId:"227255285917",
    appId:"1:227255285917:web:c89ed24a70214bed727c74"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const storage = firebase.storage();

  const input = document.getElementById("msgInput");
  const imgInput = document.getElementById("imgInput");
  const sendBtn = document.getElementById("sendBtn");
  const messagesDiv = document.getElementById("messages");

  // Gestion utilisateurs
  function getUsers(){ return JSON.parse(localStorage.getItem("users")||"{}"); }
  function saveUsers(users){ localStorage.setItem("users", JSON.stringify(users)); }
  function register(){
    let u=document.getElementById("registerUser").value.trim();
    let p=document.getElementById("registerPass").value.trim();
    if(!u||!p){ alert("Remplis tous les champs"); return; }
    let users=getUsers();
    if(users[u]){ alert("Utilisateur déjà existant"); return; }
    users[u]=p; saveUsers(users);
    alert("Compte créé !"); showLogin();
  }
  function login(){
    let u=document.getElementById("loginUser").value.trim();
    let p=document.getElementById("loginPass").value.trim();
    let users=getUsers();
    if(users[u] && users[u]===p){
      document.getElementById("loginPage").style.display="none";
      document.getElementById("mainSite").style.display="block";
      document.getElementById("userDisplay").innerText="Connecté en tant que : "+u;
    } else alert("Identifiants incorrects");
  }
  function logout(){ document.getElementById("mainSite").style.display="none"; document.getElementById("loginPage").style.display="flex"; }
  function showRegister(){ document.getElementById("loginPage").style.display="none"; document.getElementById("registerPage").style.display="flex"; }
  function showLogin(){ document.getElementById("registerPage").style.display="none"; document.getElementById("loginPage").style.display="flex"; }
  function showPage(id){ document.querySelectorAll(".page").forEach(p=>p.classList.remove("active")); document.getElementById(id).classList.add("active"); }

  // Envoyer message ou image
  sendBtn.addEventListener("click", function(){
    const user = document.getElementById("userDisplay").innerText.replace("Connecté en tant que : ","") || "Invité";
    const text = input.value.trim();
    if(imgInput.files.length > 0){
      const file = imgInput.files[0];
      const storageRef = storage.ref('images/'+Date.now()+"_"+file.name);
      storageRef.put(file).then(snapshot=>{
        snapshot.ref.getDownloadURL().then(url=>{
          db.ref('messages').push({ user, text, imgUrl: url });
          input.value=""; imgInput.value="";
        });
      });
    } else if(text){
      db.ref('messages').push({ user, text });
      input.value="";
    }
  });

  // Recevoir messages en direct
  db.ref('messages').on('child_added', snapshot=>{
    const data = snapshot.val();
    if(!data) return;
    let html = `<div><b>${data.user}:</b> ${data.text||""}`;
    if(data.imgUrl){ html += `<br><img class="chat-img" src="${data.imgUrl}">`; }
    html += "</div>";
    messagesDiv.innerHTML += html;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
</script>

</body>
</html>
