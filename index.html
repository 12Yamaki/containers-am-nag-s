<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat Employés</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      height: 100vh;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .link {
      margin-top: 10px;
      display: block;
      color: #667eea;
      cursor: pointer;
    }

    nav {
      background: #333;
      padding: 10px;
      display: flex;
      justify-content: space-around;
    }

    nav button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    .page {
      display: none;
      padding: 20px;
      background: white;
      min-height: calc(100vh - 50px);
    }

    .active {
      display: block;
    }

    #messages {
      height: 250px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }

    #msgInput {
      width: 70%;
      padding: 5px;
    }

    #chat button {
      width: 28%;
      padding: 5px;
    }
  </style>
</head>

<body>

<!-- CONNEXION -->
<div id="loginPage" class="container">
  <div class="box">
    <h2>Connexion</h2>
    <input type="text" id="loginUser" placeholder="Nom d'utilisateur">
    <input type="password" id="loginPass" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <span class="link" onclick="showRegister()">Créer un compte</span>
  </div>
</div>

<!-- INSCRIPTION -->
<div id="registerPage" class="container" style="display:none;">
  <div class="box">
    <h2>Inscription</h2>
    <input type="text" id="registerUser" placeholder="Nom d'utilisateur">
    <input type="password" id="registerPass" placeholder="Mot de passe">
    <button onclick="register()">S'inscrire</button>
    <span class="link" onclick="showLogin()">Déjà un compte ?</span>
  </div>
</div>

<!-- SITE -->
<div id="mainSite" style="display:none;">

  <nav>
    <button onclick="showPage('home')">Accueil</button>
    <button onclick="showPage('profile')">Profil</button>
    <button onclick="showPage('chat')">Chat</button>
    <button onclick="logout()">Déconnexion</button>
  </nav>

  <div id="home" class="page active">
    <h2>Accueil</h2>
    <p>Bienvenue sur le chat interne !</p>
  </div>

  <div id="profile" class="page">
    <h2>Profil</h2>
    <p id="userDisplay"></p>
  </div>

  <!-- PAGE CHAT -->
  <div id="chat" class="page">
    <h2>Communication</h2>
    <div id="messages"></div>
    <input id="msgInput" placeholder="Écris un message">
    <button>Envoyer</button>
  </div>

</div>

<script>
  // Gestion des utilisateurs stockés en localStorage
  function getUsers() {
    return JSON.parse(localStorage.getItem("users") || "{}");
  }
  function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
  }

  function register() {
    let user = document.getElementById("registerUser").value.trim();
    let pass = document.getElementById("registerPass").value.trim();
    if (!user || !pass) { alert("Remplis tous les champs"); return; }

    let users = getUsers();
    if (users[user]) { alert("Utilisateur déjà existant"); return; }

    users[user] = pass;
    saveUsers(users);
    alert("Compte créé !");
    showLogin();
  }

  function login() {
    let user = document.getElementById("loginUser").value.trim();
    let pass = document.getElementById("loginPass").value.trim();
    let users = getUsers();

    if (users[user] && users[user] === pass) {
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("mainSite").style.display = "block";
      document.getElementById("userDisplay").innerText = "Connecté en tant que : " + user;
    } else { alert("Identifiants incorrects"); }
  }

  function logout() {
    document.getElementById("mainSite").style.display = "none";
    document.getElementById("loginPage").style.display = "flex";
  }

  function showRegister() {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("registerPage").style.display = "flex";
  }

  function showLogin() {
    document.getElementById("registerPage").style.display = "none";
    document.getElementById("loginPage").style.display = "flex";
  }

  function showPage(pageId) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
  }
</script>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBlQw4vMAqGU4Ii8ShHptQOqMvfnoXqBdA",
    authDomain: "contenaires-it.firebaseapp.com",
    databaseURL: "https://contenaires-it-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "contenaires-it",
    storageBucket: "contenaires-it.firebasestorage.app",
    messagingSenderId: "227255285917",
    appId: "1:227255285917:web:c89ed24a70214bed727c74"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const input = document.getElementById("msgInput");
  const chatBtn = document.querySelector("#chat button");
  const messagesDiv = document.getElementById("messages");

  // Envoyer message
  function sendMsg() {
    const user = document.getElementById("userDisplay").innerText.replace("Connecté en tant que : ","") || "Invité";
    const text = input.value.trim();
    if(!text) return;
    push(ref(db, "messages"), { user, text });
    input.value = "";
  }

  chatBtn.addEventListener("click", sendMsg);

  // Recevoir messages en direct
  onChildAdded(ref(db, "messages"), snapshot => {
    const data = snapshot.val();
    if (!data) return;
    messagesDiv.innerHTML += `<div><b>${data.user}:</b> ${data.text}</div>`;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
</script>

</body>
</html>
