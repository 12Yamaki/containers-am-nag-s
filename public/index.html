<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Workspace Pro - Chat & IA</title>
  <style>
    :root {
      --primary: #075e54;
      --secondary: #128c7e;
      --bg-chat: #e5ddd5;
      --my-msg: #dcf8c6;
      --other-msg: #ffffff;
    }

    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin:0; 
      height:100vh;
      background: #f0f2f5;
    }

    /* Arrière-plan avec dessins subtils (Style WhatsApp) */
    .chat-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: var(--bg-chat);
      background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
      opacity: 0.06;
      z-index: -1;
    }

    nav { 
      background: var(--primary); 
      padding: 12px; 
      display: flex; 
      justify-content: center; 
      gap: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    
    nav button { 
      background: rgba(255,255,255,0.1); 
      border: none; 
      color: white; 
      padding: 8px 20px; 
      border-radius: 20px; 
      cursor: pointer; 
      transition: 0.3s;
    }
    
    nav button:hover { background: rgba(255,255,255,0.3); }

    .page { 
      display:none; 
      max-width: 900px; 
      margin: 20px auto; 
      background: rgba(255, 255, 255, 0.9); 
      border-radius: 10px; 
      height: 80vh;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    .active { display: flex; }

    /* Zone des messages */
    #messages, #aiMessages { 
      flex: 1; 
      overflow-y: auto; 
      padding: 20px; 
      display: flex; 
      flex-direction: column; 
      gap: 10px;
    }

    /* Bulles de message */
    .msg-wrapper { display: flex; width: 100%; }
    .msg-me { justify-content: flex-end; }
    .msg-other { justify-content: flex-start; }

    .bubble { 
      max-width: 70%; 
      padding: 10px 15px; 
      border-radius: 15px; 
      position: relative; 
      font-size: 15px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    
    .msg-me .bubble { background: var(--my-msg); border-bottom-right-radius: 2px; }
    .msg-other .bubble { background: var(--other-msg); border-bottom-left-radius: 2px; }

    .author { font-size: 12px; font-weight: bold; color: var(--secondary); margin-bottom: 4px; display: block; }

    /* --- EFFET DE FLOUTAGE --- */
    .blur-text {
      filter: blur(5px);
      transition: filter 0.3s ease;
      cursor: pointer;
      user-select: none;
    }
    
    .blur-text.reveal {
      filter: blur(0);
      user-select: text;
    }

    /* Barre d'envoi */
    .input-area { 
      padding: 15px; 
      background: #f0f0f0; 
      display: flex; 
      gap: 10px; 
    }
    
    .input-area input { 
      flex: 1; 
      padding: 12px; 
      border: none; 
      border-radius: 25px; 
      outline: none; 
    }
    
    .input-area button { 
      background: var(--secondary); 
      color: white; 
      border: none; 
      width: 45px; 
      height: 45px; 
      border-radius: 50%; 
      cursor: pointer; 
    }

    /* Login / Register */
    .container { display:flex; justify-content:center; align-items:center; height:100vh; }
    .box { background:white; padding:40px; border-radius:20px; width:350px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<div class="chat-bg"></div>

<div id="loginPage" class="container">
  <div class="box">
    <h2 style="color: var(--primary)">Bienvenue</h2>
    <input type="text" id="loginUser" placeholder="Utilisateur">
    <input type="password" id="loginPass" placeholder="Mot de passe">
    <button onclick="login()" style="background: var(--primary); color: white; padding: 12px; border:none; width:100%; border-radius:10px; cursor:pointer;">Se connecter</button>
    <span class="link" onclick="showRegister()" style="display:block; margin-top:15px; color: var(--secondary); cursor:pointer;">Créer un compte</span>
  </div>
</div>
